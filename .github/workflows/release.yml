name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15
            artifact: mac_iotop-amd64
          - target: aarch64-apple-darwin
            os: macos-15
            artifact: mac_iotop-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/mac_iotop ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/mac_iotop-amd64/mac_iotop-amd64 \
            artifacts/mac_iotop-arm64/mac_iotop-arm64

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SHA_ARM64=$(sha256sum artifacts/mac_iotop-arm64/mac_iotop-arm64 | awk '{print $1}')
          SHA_AMD64=$(sha256sum artifacts/mac_iotop-amd64/mac_iotop-amd64 | awk '{print $1}')
          bash .github/update-formula.sh "$VERSION" "$SHA_ARM64" "$SHA_AMD64"
